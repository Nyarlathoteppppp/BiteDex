<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#ede7f6" stroke="#b39ddb" stroke-width="3"/>

  <!-- Zzz bubbles -->
  <text x="148" y="52" font-size="13" fill="#9575cd" font-family="sans-serif" font-weight="bold">z</text>
  <text x="158" y="40" font-size="16" fill="#7e57c2" font-family="sans-serif" font-weight="bold">z</text>
  <text x="170" y="26" font-size="19" fill="#673ab7" font-family="sans-serif" font-weight="bold">Z</text>

  <!-- Ears -->
  <ellipse cx="55" cy="64" rx="22" ry="26" fill="#9575cd"/>
  <ellipse cx="55" cy="64" rx="13" ry="17" fill="#e8d5f5"/>
  <ellipse cx="145" cy="64" rx="22" ry="26" fill="#9575cd"/>
  <ellipse cx="145" cy="64" rx="13" ry="17" fill="#e8d5f5"/>

  <!-- Body / Head -->
  <circle cx="100" cy="108" r="68" fill="#b39ddb"/>

  <!-- Cheek blush - soft -->
  <ellipse cx="72" cy="120" rx="13" ry="8" fill="#ce93d8" opacity="0.4"/>
  <ellipse cx="128" cy="120" rx="13" ry="8" fill="#ce93d8" opacity="0.4"/>

  <!-- Eyes - half closed / droopy -->
  <circle cx="84" cy="100" r="11" fill="white"/>
  <circle cx="116" cy="100" r="11" fill="white"/>
  <circle cx="86" cy="103" r="6" fill="#3e2723"/>
  <circle cx="118" cy="103" r="6" fill="#3e2723"/>
  <circle cx="88" cy="101" r="2" fill="white"/>
  <circle cx="120" cy="101" r="2" fill="white"/>
  <!-- Droopy eyelids -->
  <path d="M73 100 Q84 91 95 100" fill="#b39ddb" stroke="none"/>
  <path d="M105 100 Q116 91 127 100" fill="#b39ddb" stroke="none"/>

  <!-- Nose -->
  <ellipse cx="100" cy="116" rx="5" ry="4" fill="#7e57c2"/>

  <!-- Tired small downturned mouth -->
  <path d="M91 129 Q100 125 109 129" stroke="#4527a0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left - drooping -->
  <line x1="62" y1="116" x2="87" y2="119" stroke="#d1c4e9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="123" x2="86" y2="124" stroke="#d1c4e9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers right - drooping -->
  <line x1="138" y1="116" x2="113" y2="119" stroke="#d1c4e9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="123" x2="114" y2="124" stroke="#d1c4e9" stroke-width="1.5" stroke-linecap="round"/>
</svg>
