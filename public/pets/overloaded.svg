<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background - stressed red/orange -->
  <circle cx="100" cy="100" r="95" fill="#fbe9e7" stroke="#ff7043" stroke-width="3"/>

  <!-- Stress marks -->
  <path d="M32 40 L40 30 L36 42" stroke="#ff5722" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M164 36 L156 26 L160 38" stroke="#ff5722" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M25 140 L33 130 L29 142" stroke="#ef9a9a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M168 145 L160 135 L164 147" stroke="#ef9a9a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sweat drops -->
  <ellipse cx="148" cy="75" rx="4" ry="6" fill="#64b5f6" opacity="0.8"/>
  <path d="M144 72 Q148 64 152 72" fill="#64b5f6" opacity="0.8"/>
  <ellipse cx="52" cy="80" rx="3" ry="5" fill="#64b5f6" opacity="0.7"/>
  <path d="M49 77 Q52 71 55 77" fill="#64b5f6" opacity="0.7"/>

  <!-- Ears - flattened/pressed down from stress -->
  <ellipse cx="56" cy="68" rx="20" ry="20" fill="#ff7043"/>
  <ellipse cx="56" cy="68" rx="12" ry="13" fill="#ffccbc"/>
  <ellipse cx="144" cy="68" rx="20" ry="20" fill="#ff7043"/>
  <ellipse cx="144" cy="68" rx="12" ry="13" fill="#ffccbc"/>

  <!-- Body / Head -->
  <circle cx="100" cy="110" r="68" fill="#ff8a65"/>

  <!-- Angry/stressed eyebrows -->
  <path d="M72 87 Q83 81 94 87" stroke="#bf360c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M106 87 Q117 81 128 87" stroke="#bf360c" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- X eyes (overwhelmed) -->
  <!-- Left eye white -->
  <circle cx="84" cy="102" r="12" fill="white"/>
  <!-- Left X -->
  <line x1="77" y1="95" x2="91" y2="109" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <line x1="91" y1="95" x2="77" y2="109" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <!-- Right eye white -->
  <circle cx="116" cy="102" r="12" fill="white"/>
  <!-- Right X -->
  <line x1="109" y1="95" x2="123" y2="109" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>
  <line x1="123" y1="95" x2="109" y2="109" stroke="#bf360c" stroke-width="3" stroke-linecap="round"/>

  <!-- Blush - deep stress red -->
  <ellipse cx="71" cy="118" rx="14" ry="9" fill="#e53935" opacity="0.4"/>
  <ellipse cx="129" cy="118" rx="14" ry="9" fill="#e53935" opacity="0.4"/>

  <!-- Nose -->
  <ellipse cx="100" cy="120" rx="5" ry="4" fill="#bf360c"/>

  <!-- Wavy stressed mouth -->
  <path d="M86 133 Q92 128 100 133 Q108 138 114 133" stroke="#bf360c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers - frazzled -->
  <line x1="62" y1="116" x2="86" y2="119" stroke="#ffab91" stroke-width="1.5" stroke-linecap="round" transform="rotate(8 62 116)"/>
  <line x1="60" y1="124" x2="85" y2="124" stroke="#ffab91" stroke-width="1.5" stroke-linecap="round" transform="rotate(-4 60 124)"/>
  <line x1="138" y1="116" x2="114" y2="119" stroke="#ffab91" stroke-width="1.5" stroke-linecap="round" transform="rotate(-8 138 116)"/>
  <line x1="140" y1="124" x2="115" y2="124" stroke="#ffab91" stroke-width="1.5" stroke-linecap="round" transform="rotate(4 140 124)"/>
</svg>
