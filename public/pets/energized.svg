<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#fffde7" stroke="#fff176" stroke-width="3"/>

  <!-- Energy sparkles -->
  <polygon points="30,30 33,22 36,30 44,33 36,36 33,44 30,36 22,33" fill="#ffeb3b"/>
  <polygon points="168,25 170,19 172,25 178,27 172,29 170,35 168,29 162,27" fill="#ffa726"/>
  <polygon points="170,155 172,149 174,155 180,157 174,159 172,165 170,159 164,157" fill="#ffeb3b"/>

  <!-- Ears -->
  <ellipse cx="55" cy="60" rx="22" ry="26" fill="#ffd54f"/>
  <ellipse cx="55" cy="60" rx="13" ry="17" fill="#ffccbc"/>
  <ellipse cx="145" cy="60" rx="22" ry="26" fill="#ffd54f"/>
  <ellipse cx="145" cy="60" rx="13" ry="17" fill="#ffccbc"/>

  <!-- Body / Head -->
  <circle cx="100" cy="108" r="68" fill="#ffca28"/>

  <!-- Cheek blush -->
  <ellipse cx="71" cy="117" rx="14" ry="9" fill="#ff8a65" opacity="0.6"/>
  <ellipse cx="129" cy="117" rx="14" ry="9" fill="#ff8a65" opacity="0.6"/>

  <!-- Eyes - wide open excited -->
  <circle cx="84" cy="98" r="13" fill="white"/>
  <circle cx="116" cy="98" r="13" fill="white"/>
  <circle cx="86" cy="100" r="8" fill="#3e2723"/>
  <circle cx="118" cy="100" r="8" fill="#3e2723"/>
  <!-- Eye shine big -->
  <circle cx="89" cy="96" r="3" fill="white"/>
  <circle cx="121" cy="96" r="3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="100" cy="114" rx="5" ry="4" fill="#e57373"/>

  <!-- Big excited open smile -->
  <path d="M85 125 Q100 145 115 125" stroke="#5d4037" stroke-width="2.5" fill="#fff9c4" stroke-linecap="round"/>

  <!-- Eyebrows raised -->
  <path d="M76 82 Q84 76 92 80" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M108 80 Q116 76 124 82" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="61" y1="112" x2="86" y2="116" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="59" y1="118" x2="85" y2="119" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="139" y1="112" x2="114" y2="116" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="141" y1="118" x2="115" y2="119" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
</svg>
